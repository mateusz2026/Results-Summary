<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Results summary component</title>
  </head>
  <body>
    <div class="container">
      <header>
        <h3>Your Result</h3>
        <div class="radius">
          <div class="up">76</div>
          <p class="down">of 100</p>
        </div>
        <h2>Great</h2>

        <span class="paragraf"
          ><p>
            You scored higher than 65% of the people who have taken these tests.
          </p></span
        >
      </header>
      <main>
        <h3 class="sum">Summary</h3>

        <div class="item">
          <div class="left-a">
            <img src="assets/images/icon-reaction.svg" />Reaction
          </div>
          <div class="right"><strong>80</strong> /100</div>
        </div>

        <div class="item">
          <div class="left-b">
            <img src="assets/images/icon-memory.svg" />Memory
          </div>
          <div class="right"><strong>92</strong>/100</div>
        </div>

        <div class="item">
          <div class="left-c">
            <img src="assets/images/icon-verbal.svg" />Verbal
          </div>
          <div class="right"><strong>61</strong>/100</div>
        </div>

        <div class="item">
          <div class="left-d">
            <img src="assets/images/icon-visual.svg" />Visual
          </div>
          <div class="right"><strong>72</strong>/100</div>
        </div>

        <div class="button">
          <button class="btn">Continue</button>
        </div>
      </main>
    </div>
  </body>
</html>
